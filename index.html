<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Counting Stars</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
      overflow: hidden;
      height: 100vh;
      color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .score {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .star {
      position: absolute;
      top: -10px;
      font-size: 2rem;
      color: #ffffff;
      animation: fall linear infinite;
      cursor: pointer;
      text-shadow: 0 0 10px #fff;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10px);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }

    .reward {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 30px;
      border: 2px solid #fff;
      border-radius: 20px;
      animation: pop 0.5s ease;
      text-align: center;
      color: #ffb3ec;
      box-shadow: 0 0 20px #ff69b4;
    }

    @keyframes pop {
      0% { transform: scale(0) translate(-50%, -50%); opacity: 0; }
      100% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
    }

    .heart {
      font-size: 3rem;
      animation: beat 1s infinite;
      display: inline-block;
      margin-top: 10px;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

  </style>
</head>
<body>
  <h1>Counting Stars... ★</h1>
  <div class="score">Pontuação: <span id="score">0</span></div>

  <script>
    let score = 0;
    const scoreElement = document.getElementById('score');
    let prizeGiven = false;

    function createStar() {
      const star = document.createElement('div');
      star.classList.add('star');
      star.textContent = '★';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.animationDuration = (4 + Math.random() * 2) + 's'; // mais devagar

      // Clique = +1 ponto
      star.addEventListener('click', () => {
        score++;
        scoreElement.textContent = score;
        star.remove();

        if (score >= 100 && !prizeGiven) {
          prizeGiven = true;
          giveReward();
        }
      });

      document.body.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 7000); // tempo compatível com a animação
    }

    function giveReward() {
      const reward = document.createElement('div');
      reward.className = 'reward';
      reward.innerHTML = `
        🌟 Você chegou em 100 estrelas!<br>
        <strong>Você merece todo o meu universo!</strong><br>
        <div class="heart">💖</div>
      `;
      document.body.appendChild(reward);
      setTimeout(() => {
        reward.remove();
      }, 10000); // Some após 10 segundos
    }

    setInterval(createStar, 300); // um pouco mais espaçado
  </script>
</body>
</html>
